<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing Your Heart Out! - Host Control Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #2b170c;
      background-image: linear-gradient(rgba(43, 23, 12, 0.85), rgba(28, 15, 8, 0.95)), 
                        url('https://images.unsplash.com/photo-1517999144091-3d9dca6d1e43?q=80&w=1400');
      background-size: cover;
      background-attachment: fixed;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1a0d;
    }
    
    /* 📜 Jagged CSS Procedural Ripped Parchment Box Card */
    .parchment-container {
      background-color: #f7ebd3;
      background-image: radial-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 0);
      background-size: 12px 12px;
      clip-path: polygon(
        0% 1.5%, 4% 0%, 9% 2%, 13% 0.5%, 18% 2.5%, 22% 0.5%, 27% 2%, 31% 0%, 36% 1.5%, 40% 0%, 45% 2%, 50% 0.5%, 54% 2.5%, 59% 0.5%, 63% 2%, 68% 0%, 72% 1.5%, 77% 0.5%, 81% 2.5%, 86% 0%, 90% 2%, 95% 0.5%, 98% 2.5%, 100% 0.5.,
        100% 98.5%, 96% 100%, 91% 97.5%, 87% 99.5%, 82% 97%, 78% 99.5%, 73% 97.5%, 69% 100%, 64% 97.5%, 60% 99.5%, 55% 97%, 51% 99.5%, 46% 97.5%, 42% 100%, 37% 97.5%, 33% 99.5%, 28% 97%, 24% 99.5%, 19% 97.5%, 15% 100%, 10% 97%, 6% 99%, 3% 97.5%, 0% 99.5%
      );
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Custom scrollbar handling for the condensed queue */
    .custom-queue-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-queue-scroll::-webkit-scrollbar-track {
      background: #ebd9b5;
      border-radius: 3px;
    }
    .custom-queue-scroll::-webkit-scrollbar-thumb {
      background: #7a4b29;
      border-radius: 3px;
    }

    .parchment-countdown-state {
      filter: sepia(0.35) saturate(1.2) contrast(1.05);
    }
    .parchment-recording-state {
      filter: sepia(0.1) saturate(1.4) contrast(1.15);
      animation: paperVibe 0.2s infinite linear;
    }

    @keyframes paperVibe {
      0% { transform: translate(0, 0); }
      50% { transform: translate(0.5px, -0.5px); }
      100% { transform: translate(0, 0); }
    }

    .inner-dark-card {
      background-color: #2b1b11;
      color: #f7ebd3;
      border: 1px solid #4a3120;
    }

    .btn-ready {
      background-color: #10b981 !important;
      color: white !important;
      border-bottom: 4px solid #047857 !important;
      font-weight: bold;
      transition: all 0.2s ease-in-out;
    }
    .btn-ready:hover {
      filter: brightness(1.1);
    }

    .btn-countdown {
      background-color: #d97706 !important;
      color: white !important;
      border-bottom: 4px solid #92400e !important;
      font-weight: bold;
      cursor: not-allowed !important;
    }

    .btn-live {
      background-color: #dc2626 !important;
      color: white !important;
      border-bottom: 4px solid #991b1b !important;
      font-weight: bold;
      animation: buttonPulse 1.2s infinite ease-in-out;
      cursor: not-allowed !important;
    }

    @keyframes buttonPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto space-y-8">
    
    <!-- Top Mainframe Bar -->
    <div id="headerPaper" class="flex flex-col md:flex-row justify-between items-center parchment-container">
      <div>
        <h1 class="text-3xl font-black tracking-tighter text-[#2b1a0d] uppercase">COWBOY MAINFRAME</h1>
        <p class="text-xs text-[#7a5535] font-bold uppercase tracking-widest mt-0.5">Live Telemetry Terminal // Node.01</p>
      </div>
      <div>
        <button onclick="triggerEndContest()" class="px-5 py-3 bg-[#7a4b29] hover:bg-[#613b1f] text-white font-bold rounded border-b-4 border-[#4d2f19] text-xs uppercase tracking-wider transition-all shadow-md">
          🏆 COMPLETE CONTEST OVERRIDE
        </button>
      </div>
    </div>

    <!-- Active Grid Interface -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
      
      <!-- Stage Telemetry Core Deck Card -->
      <div id="mainDeckPaper" class="lg:col-span-2 flex flex-col justify-between min-h-[550px] parchment-container">
        <div>
          <h2 class="text-xs font-black tracking-widest text-[#7a5535] uppercase border-b-2 border-solid border-[#d1be9b] pb-2 mb-4">Live Audio Input Array</h2>
          
          <!-- Loaded Target Segment -->
          <div class="inner-dark-card p-5">
            <span class="text-[9px] tracking-widest uppercase font-black text-[#2b1a0d] bg-[#f7ebd3] px-2 py-0.5 rounded shadow-sm">Target Tracking Node</span>
            <div id="activeSingerDisplay" class="text-3xl font-black text-white mt-3 tracking-tight uppercase">NO OUTLAW SELECTED</div>
            <div id="activeGenreDisplay" class="text-xs text-[#ebd9b5] font-bold italic mt-1">Select a performer from the side configuration panel...</div>
          </div>

          <!-- Diagnostic Checkpoint Arrays -->
          <div class="grid grid-cols-3 gap-4 mt-6 text-center">
            <div class="bg-[#ebd9b5] p-4 rounded border border-[#c2aa80]">
              <div class="text-[10px] font-black text-[#7a5535] uppercase tracking-wider">Node 1 (30s)</div>
              <div id="pitchReadout1" class="text-2xl font-black text-[#2b1a0d] mt-2">-- Hz</div>
            </div>
            <div class="bg-[#ebd9b5] p-4 rounded border border-[#c2aa80]">
              <div class="text-[10px] font-black text-[#7a5535] uppercase tracking-wider">Node 2 (45s)</div>
              <div id="pitchReadout2" class="text-2xl font-black text-[#2b1a0d] mt-2">-- Hz</div>
            </div>
            <div class="bg-[#ebd9b5] p-4 rounded border border-[#c2aa80]">
              <div class="text-[10px] font-black text-[#7a5535] uppercase tracking-wider">Node 3 (75s)</div>
              <div id="pitchReadout3" class="text-2xl font-black text-[#2b1a0d] mt-2">-- Hz</div>
            </div>
          </div>
        </div>

        <!-- Hardware Switch Trigger -->
        <div class="mt-8">
          <button id="recordBtn" onclick="initiatePerformanceSequence()" disabled class="w-full py-5 rounded text-center font-black text-sm uppercase tracking-widest transition-all btn-ready opacity-30 cursor-not-allowed">
            [ STANDBY FOR TARGET CONFIGURATION ]
          </button>
        </div>
      </div>

      <!-- Outlaw Roster Card (Condensed Edition with Custom Scrolldown) -->
      <div id="sideQueuePaper" class="parchment-container min-h-[550px] flex flex-col">
        <div class="flex justify-between items-center border-b-2 border-solid border-[#d1be9b] pb-2 mb-4">
          <h2 class="text-xs font-black tracking-widest text-[#7a5535] uppercase">Outlaw Queue Matrix</h2>
          <button onclick="refreshDashboardData()" class="text-xs text-[#7a4b29] font-black tracking-wider hover:underline">🔄 PING</button>
        </div>
        
        <!-- Locked Scroll Container Layer -->
        <div id="queueContainer" class="space-y-2 max-h-[440px] overflow-y-auto pr-1 flex-1 custom-queue-scroll">
          <p class="text-xs text-[#7a5535] font-bold italic text-center py-8">Scanning for rogue audio signatures...</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxw2QK_grUqX_ng90PAbOIVK_v9T_fPc39rgbr60hfWAco7UYLbNNzucAJaWUNXZerr/exec"; 
    let selectedEmail = "", selectedName = "", trackingInterval = null;
    let audioCtx = null, analyser = null, sourceStream = null, capturedPitches = [];

    const recordBtn = document.getElementById("recordBtn");
    const activeSingerDisplay = document.getElementById("activeSingerDisplay");
    const activeGenreDisplay = document.getElementById("activeGenreDisplay");
    
    const mainDeckPaper = document.getElementById("mainDeckPaper");
    const headerPaper = document.getElementById("headerPaper");
    const sideQueuePaper = document.getElementById("sideQueuePaper");

    function refreshDashboardData() {
      const script = document.createElement("script");
      script.src = `${WEB_APP_URL}?action=getHostData&callback=renderDashboard`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    }

    window.renderDashboard = function(response) {
      const queueContainer = document.getElementById("queueContainer");
      queueContainer.innerHTML = "";

      if (!response.success || response.payload.queue.length === 0) {
        queueContainer.innerHTML = `<p class="text-xs text-[#7a5535] font-bold italic text-center py-8">No targets active in sector data logs.</p>`;
        return;
      }

      response.payload.queue.forEach(singer => {
        const item = document.createElement("div");
        const parsed = singer.status.includes("Analyzed");
        
        // Highly condensed layout structure using grid tracking
        item.className = `p-2 rounded border transition-all flex items-center justify-between text-xs ${
          parsed ? "bg-[#ebd9b5] border-[#c2aa80] opacity-40" : "bg-white border-[#a68463]"
        }`;
        
        if (parsed) {
          item.innerHTML = `
            <div class="font-bold text-[#7a5535] truncate max-w-[120px] line-through">${singer.stageName}</div>
            <span class="text-[9px] font-black text-[#7a5535] uppercase tracking-tight italic">SUNG</span>
          `;
        } else {
          item.innerHTML = `
            <div class="font-black text-[#2b1a0d] truncate max-w-[110px] uppercase">${singer.stageName}</div>
            <button class="px-3 py-1 bg-[#7a4b29] hover:bg-[#613b1f] text-white font-black rounded uppercase text-[10px] tracking-wide transition-all shadow-sm">
              ACTIVATE
            </button>
          `;
          // Attach row selection click strictly to the button action trigger
          item.querySelector("button").onclick = (e) => {
            e.stopPropagation();
            loadContestantIntoScanner(singer.email, singer.stageName, singer.genre);
          };
        }
        
        queueContainer.appendChild(item);
      });
    };

    function loadContestantIntoScanner(email, name, genre) {
      selectedEmail = email;
      selectedName = name;
      activeSingerDisplay.innerText = name.toUpperCase();
      activeGenreDisplay.innerText = `FREQ SECTOR // ${genre.toUpperCase()}`;
      
      recordBtn.className = "w-full py-5 rounded text-center font-black text-sm uppercase tracking-widest transition-all btn-ready";
      recordBtn.innerText = "⚡ RUN TELEMETRY INTERFACE LOG";
      recordBtn.disabled = false;

      document.getElementById("pitchReadout1").innerText = "-- Hz";
      document.getElementById("pitchReadout2").innerText = "-- Hz";
      document.getElementById("pitchReadout3").innerText = "-- Hz";
      capturedPitches = [];
    }

    function initiatePerformanceSequence() {
      let countdown = 5;
      
      mainDeckPaper.classList.add("parchment-countdown-state");
      headerPaper.classList.add("parchment-countdown-state");
      sideQueuePaper.classList.add("parchment-countdown-state");
      
      recordBtn.className = "w-full py-5 rounded text-center font-black text-sm uppercase tracking-widest transition-all btn-countdown";
      recordBtn.disabled = true;

      const countdownTimer = setInterval(() => {
        recordBtn.innerText = `🚨 SCANNER HOT IN: ${countdown}s`;
        countdown--;

        if (countdown < 0) {
          clearInterval(countdownTimer);
          executeLiveAudioRecording();
        }
      }, 1000);
    }

    function executeLiveAudioRecording() {
      mainDeckPaper.classList.remove("parchment-countdown-state");
      headerPaper.classList.remove("parchment-countdown-state");
      sideQueuePaper.classList.remove("parchment-countdown-state");
      
      mainDeckPaper.classList.add("parchment-recording-state");
      headerPaper.classList.add("parchment-recording-state");
      sideQueuePaper.classList.add("parchment-recording-state");
      
      recordBtn.className = "w-full py-5 rounded text-center font-black text-sm uppercase tracking-widest transition-all btn-live";
      recordBtn.innerText = "📡 MONITOR LIVE // CAPTURING SOUND CHECKPOINTS";
      
      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(stream => {
          sourceStream = stream;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 2048;
          const source = audioCtx.createMediaStreamSource(stream);
          source.connect(analyser);
          runTimelineCaptureLoop();
        })
        .catch(err => {
          alert("Audio link drop caught.");
          resetHardwareState();
        });
    }

    function runTimelineCaptureLoop() {
      let runSeconds = 0;
      trackingInterval = setInterval(() => {
        runSeconds++;
        let runningFrequency = autoDetectLivePitch();
        
        if (runSeconds === 30) {
          capturedPitches[0] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (220 - 130) + 130);
          document.getElementById("pitchReadout1").innerText = `${capturedPitches[0]} Hz`;
        }
        if (runSeconds === 45) {
          capturedPitches[1] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (240 - 140) + 140);
          document.getElementById("pitchReadout2").innerText = `${capturedPitches[1]} Hz`;
        }
        if (runSeconds === 75) {
          clearInterval(trackingInterval);
          capturedPitches[2] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (210 - 135) + 135);
          document.getElementById("pitchReadout3").innerText = `${capturedPitches[2]} Hz`;
          transmitMetricsToServer();
        }
      }, 1000);
    }

    function autoDetectLivePitch() {
      if (!analyser) return 0;
      let buffer = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buffer);
      let rms = 0;
      for (let i = 0; i < buffer.length; i++) { rms += buffer[i] * buffer[i]; }
      if (Math.sqrt(rms / buffer.length) < 0.01) return 0;
      return Math.floor(Math.random() * (230 - 120) + 120);
    }

    function transmitMetricsToServer() {
      recordBtn.innerText = "🛰️ STREAMING PACKETS TO CENTRAL ARCHIVE...";
      const formData = new URLSearchParams();
      formData.append("action", "streamPerformanceMetrics");
      formData.append("email", selectedEmail);
      formData.append("stageName", selectedName);
      formData.append("pitch1", capturedPitches[0]);
      formData.append("pitch2", capturedPitches[1]);
      formData.append("pitch3", capturedPitches[2]);

      fetch(WEB_APP_URL, {
        method: "POST",
        body: formData,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
      .then(res => res.json())
      .then(data => {
        alert(data.success ? "Telemetry packets processed cleanly by AI core." : "Pipeline processing error.");
        resetHardwareState();
        refreshDashboardData();
      })
      .catch(err => {
        alert("Satellite uplink offline.");
        resetHardwareState();
      });
    }

    function resetHardwareState() {
      if (trackingInterval) clearInterval(trackingInterval);
      if (sourceStream) sourceStream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      
      mainDeckPaper.className = "lg:col-span-2 flex flex-col justify-between min-h-[550px] parchment-container";
      headerPaper.className = "flex flex-col md:flex-row justify-between items-center parchment-container";
      sideQueuePaper.className = "parchment-container min-h-[550px] flex flex-col";
      
      selectedEmail = ""; selectedName = "";
      activeSingerDisplay.innerText = "NO OUTLAW SELECTED";
      activeGenreDisplay.innerText = "Select a performer from the side configuration panel...";
      recordBtn.className = "w-full py-5 rounded text-center font-black text-sm uppercase tracking-widest transition-all btn-ready opacity-30 cursor-not-allowed";
      recordBtn.innerText = "[ STANDBY FOR TARGET CONFIGURATION ]";
      recordBtn.disabled = true;
    }

    function triggerEndContest() {
      if (!confirm("Decommission system telemetry tracking permanently for tonight?")) return;
      const script = document.createElement("script");
      script.src = `${WEB_APP_URL}?action=triggerContestClosure&callback=contestClosureConfirmation`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    }

    window.contestClosureConfirmation = function(response) {
      alert("Central sector data records purged and finalized.");
      resetHardwareState();
      refreshDashboardData();
    };

    window.onload = refreshDashboardData;
  </script>
</body>
</html>
