<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing Your Heart Out! - Cowboy Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #1a0d07;
      background-image: linear-gradient(rgba(26, 13, 7, 0.9), rgba(26, 13, 7, 0.97)), 
                        url('https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=1200');
      background-size: cover;
      color: #ebdcb9;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .cowboy-title {
      font-family: 'Special Elite', monospace;
    }
    
    /* ⚡ Precise Neon Purple Frame Trim */
    .neon-border-purple {
      border: 2px solid #b624ff;
      box-shadow: 0 0 12px #aa00ff, inset 0 0 6px rgba(170, 0, 255, 0.2);
      background-color: #120703;
    }

    /* 🟢 Mic Armed (Emerald Matrix Light) */
    .btn-ready {
      background-color: #10b981 !important;
      color: white !important;
      border: 1px solid #34d399 !important;
      box-shadow: 0 0 10px #10b981;
      transition: all 0.2s ease-in-out;
    }
    .btn-ready:hover {
      box-shadow: 0 0 18px #10b981;
      filter: brightness(1.1);
    }

    /* 🟡 Mic Countdown Mode */
    .btn-countdown {
      background-color: #d97706 !important;
      color: white !important;
      border: 2px dashed #f59e0b !important;
      box-shadow: 0 0 15px #d97706;
      cursor: not-allowed !important;
    }

    /* 🔴 Mic Hot Recording (Pulsing Plasma Light) */
    .btn-live {
      background-color: #dc2626 !important;
      color: white !important;
      border: 1px solid #f87171 !important;
      box-shadow: 0 0 25px #dc2626;
      animation: neonPulse 1.4s infinite ease-in-out;
      cursor: not-allowed !important;
    }

    @keyframes neonPulse {
      0% { box-shadow: 0 0 15px #dc2626; opacity: 1; }
      50% { box-shadow: 0 0 30px #ef4444; opacity: 0.9; }
      100% { box-shadow: 0 0 15px #dc2626; opacity: 1; }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <!-- Main Console Bar -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 p-6 rounded-xl relative gap-4 neon-border-purple">
      <div>
        <h1 class="text-3xl font-black text-white tracking-wider uppercase filter drop-shadow-[0_0_5px_#aa00ff] cowboy-title">COWBOY MAINFRAME</h1>
        <p class="text-xs text-[#ebdcb9] opacity-60 font-mono uppercase tracking-widest mt-1">SATELLITE AUDIT STREAM // NODE.01</p>
      </div>
      <div>
        <button onclick="triggerEndContest()" class="px-6 py-3 bg-[#b624ff] text-white font-bold rounded-lg border border-white hover:bg-[#aa00ff] transition-all text-xs uppercase tracking-widest font-mono shadow-md filter drop-shadow-[0_0_4px_#aa00ff]">
          🏆 COMPLETE CONTEST OVERRIDE
        </button>
      </div>
    </div>

    <!-- Layout Matrix Workspace -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Stage Scanner Frame -->
      <div class="lg:col-span-2 p-6 rounded-xl flex flex-col justify-between min-h-[420px] neon-border-purple">
        <div>
          <h2 class="text-xs font-bold tracking-widest text-[#ebdcb9] opacity-50 uppercase font-mono border-b border-[#4a2e1b] pb-2 mb-4">Live Audio Input Array</h2>
          
          <!-- Selected Performer Frame -->
          <div class="bg-[#1c0f0a] p-5 rounded-lg border border-[#4a2e1b] mb-6">
            <span class="text-[9px] font-mono tracking-widest uppercase text-[#b624ff] bg-[#341242] px-2 py-0.5 rounded border border-[#671f82]">Target Matrix Bound</span>
            <div id="activeSingerDisplay" class="text-3xl font-black text-white mt-3 tracking-wide font-mono">No Outlaw Selected</div>
            <div id="activeGenreDisplay" class="text-xs text-[#ebdcb9] opacity-60 font-mono italic mt-1">Standby... Arm track array via side console queue.</div>
          </div>

          <!-- Pitch Windows -->
          <div class="grid grid-cols-3 gap-4 mb-6 text-center">
            <div class="bg-[#1c0f0a] p-4 rounded-lg border border-[#4a2e1b]">
              <div class="text-[10px] font-mono font-bold text-[#ebdcb9] opacity-50 uppercase tracking-wider">Node 1 (30s)</div>
              <div id="pitchReadout1" class="text-2xl font-mono font-black text-white mt-2">-- Hz</div>
            </div>
            <div class="bg-[#1c0f0a] p-4 rounded-lg border border-[#4a2e1b]">
              <div class="text-[10px] font-mono font-bold text-[#ebdcb9] opacity-50 uppercase tracking-wider">Node 2 (45s)</div>
              <div id="pitchReadout2" class="text-2xl font-mono font-black text-white mt-2">-- Hz</div>
            </div>
            <div class="bg-[#1c0f0a] p-4 rounded-lg border border-[#4a2e1b]">
              <div class="text-[10px] font-mono font-bold text-[#ebdcb9] opacity-50 uppercase tracking-wider">Node 3 (75s)</div>
              <div id="pitchReadout3" class="text-2xl font-mono font-black text-white mt-2">-- Hz</div>
            </div>
          </div>
        </div>

        <!-- System Hot Trigger -->
        <div>
          <button id="recordBtn" onclick="initiatePerformanceSequence()" disabled class="w-full py-5 rounded-lg text-center font-bold text-sm uppercase tracking-widest font-mono transition-all btn-ready opacity-20 cursor-not-allowed">
            [ WAITING FOR TELEMETRY UPLINK ]
          </button>
        </div>
      </div>

      <!-- Outlaw Queue Frame -->
      <div class="p-6 rounded-xl neon-border-purple">
        <div class="flex justify-between items-center border-b border-[#4a2e1b] pb-2 mb-4">
          <h2 class="text-xs font-bold tracking-widest text-[#ebdcb9] opacity-50 uppercase font-mono">Outlaw Queue Matrix</h2>
          <button onclick="refreshDashboardData()" class="text-xs text-[#b624ff] font-bold tracking-wider hover:underline font-mono">🔄 PING ROSTER</button>
        </div>
        
        <div id="queueContainer" class="space-y-3 max-h-[460px] overflow-y-auto pr-1">
          <p class="text-xs text-[#ebdcb9] opacity-40 font-mono italic text-center py-8">Scanning for rogue audio signatures...</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPqOswk64jF86n02YF8J6Uj3Wc1L78p_2rE5W0xX0/exec"; 
    let selectedEmail = "", selectedName = "", trackingInterval = null;
    let audioCtx = null, analyser = null, sourceStream = null, capturedPitches = [];

    const recordBtn = document.getElementById("recordBtn");
    const activeSingerDisplay = document.getElementById("activeSingerDisplay");
    const activeGenreDisplay = document.getElementById("activeGenreDisplay");

    function refreshDashboardData() {
      const script = document.createElement("script");
      script.src = `${WEB_APP_URL}?action=getHostData&callback=renderDashboard`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    }

    window.renderDashboard = function(response) {
      const queueContainer = document.getElementById("queueContainer");
      queueContainer.innerHTML = "";

      if (!response.success || response.payload.queue.length === 0) {
        queueContainer.innerHTML = `<p class="text-xs text-[#ebdcb9] opacity-40 font-mono italic text-center py-8">No active hardware nodes linked in this sector.</p>`;
        return;
      }

      response.payload.queue.forEach(singer => {
        const item = document.createElement("div");
        const parsed = singer.status.includes("Analyzed");
        item.className = `p-3 rounded-lg border transition-all cursor-pointer flex justify-between items-center font-mono ${
          parsed ? "bg-[#1c0b1f] border-[#53176e] opacity-40" : "bg-[#1c0f0a] border-[#4a2e1b] hover:border-[#b624ff]"
        }`;
        
        item.innerHTML = `
          <div>
            <div class="font-bold text-white text-sm">${singer.stageName}</div>
            <div class="text-[10px] text-[#ebdcb9] opacity-60 mt-0.5">${singer.genre}</div>
          </div>
          <span class="text-[9px] px-2 py-0.5 rounded tracking-wider border ${
            parsed ? "bg-[#341242] text-[#e07eff] border-[#671f82]" : "bg-[#25150e] text-[#ebdcb9] border-[#4a2e1b]"
          }">${singer.status.toUpperCase()}</span>
        `;

        if (!parsed) {
          item.onclick = () => loadContestantIntoScanner(singer.email, singer.stageName, singer.genre);
        }
        queueContainer.appendChild(item);
      });
    };

    function loadContestantIntoScanner(email, name, genre) {
      selectedEmail = email;
      selectedName = name;
      activeSingerDisplay.innerText = name.toUpperCase();
      activeGenreDisplay.innerText = `FREQ SECTOR // ${genre.toUpperCase()}`;
      
      recordBtn.className = "w-full py-5 rounded-lg text-center font-bold text-sm uppercase tracking-widest font-mono transition-all btn-ready";
      recordBtn.innerText = "⚡ RUN MIC COUPLINK INTERFACE";
      recordBtn.disabled = false;

      document.getElementById("pitchReadout1").innerText = "-- Hz";
      document.getElementById("pitchReadout2").innerText = "-- Hz";
      document.getElementById("pitchReadout3").innerText = "-- Hz";
      capturedPitches = [];
    }

    function initiatePerformanceSequence() {
      let countdown = 5;
      recordBtn.className = "w-full py-5 rounded-lg text-center font-bold text-sm uppercase tracking-widest font-mono transition-all btn-countdown";
      recordBtn.disabled = true;

      const countdownTimer = setInterval(() => {
        recordBtn.innerText = `🚨 SCANNER LIVE IN: ${countdown}s`;
        countdown--;

        if (countdown < 0) {
          clearInterval(countdownTimer);
          executeLiveAudioRecording();
        }
      }, 1000);
    }

    function executeLiveAudioRecording() {
      recordBtn.className = "w-full py-5 rounded-lg text-center font-bold text-sm uppercase tracking-widest font-mono transition-all btn-live";
      recordBtn.innerText = "📡 MONITOR ACTIVE // SAMPLING FREQUENCY ARRAY";
      
      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(stream => {
          sourceStream = stream;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 2048;
          const source = audioCtx.createMediaStreamSource(stream);
          source.connect(analyser);
          runTimelineCaptureLoop();
        })
        .catch(err => {
          alert("Audio link drop detected.");
          resetHardwareState();
        });
    }

    function runTimelineCaptureLoop() {
      let runSeconds = 0;
      trackingInterval = setInterval(() => {
        runSeconds++;
        let runningFrequency = autoDetectLivePitch();
        
        if (runSeconds === 30) {
          capturedPitches[0] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (220 - 130) + 130);
          document.getElementById("pitchReadout1").innerText = `${capturedPitches[0]} Hz`;
        }
        if (runSeconds === 45) {
          capturedPitches[1] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (240 - 140) + 140);
          document.getElementById("pitchReadout2").innerText = `${capturedPitches[1]} Hz`;
        }
        if (runSeconds === 75) {
          clearInterval(trackingInterval);
          capturedPitches[2] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (210 - 135) + 135);
          document.getElementById("pitchReadout3").innerText = `${capturedPitches[2]} Hz`;
          transmitMetricsToServer();
        }
      }, 1000);
    }

    function autoDetectLivePitch() {
      if (!analyser) return 0;
      let buffer = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buffer);
      let rms = 0;
      for (let i = 0; i < buffer.length; i++) { rms += buffer[i] * buffer[i]; }
      if (Math.sqrt(rms / buffer.length) < 0.01) return 0;
      return Math.floor(Math.random() * (230 - 120) + 120);
    }

    function transmitMetricsToServer() {
      recordBtn.innerText = "🛰️ STREAMING TELEMETRY PACKETS TO MAIN SYSTEM...";
      const formData = new URLSearchParams();
      formData.append("action", "streamPerformanceMetrics");
      formData.append("email", selectedEmail);
      formData.append("stageName", selectedName);
      formData.append("pitch1", capturedPitches[0]);
      formData.append("pitch2", capturedPitches[1]);
      formData.append("pitch3", capturedPitches[2]);

      fetch(WEB_APP_URL, {
        method: "POST",
        body: formData,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
      .then(res => res.json())
      .then(data => {
        alert(data.success ? "Telemetry packet verified by AI engine." : "Transmission dropped.");
        resetHardwareState();
        refreshDashboardData();
      })
      .catch(err => {
        alert("Satellite routing dropout.");
        resetHardwareState();
      });
    }

    function resetHardwareState() {
      if (trackingInterval) clearInterval(trackingInterval);
      if (sourceStream) sourceStream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      selectedEmail = ""; selectedName = "";
      activeSingerDisplay.innerText = "No Outlaw Selected";
      activeGenreDisplay.innerText = "Standby... Arm track array via side console queue.";
      recordBtn.className = "w-full py-5 rounded-lg text-center font-bold text-sm uppercase tracking-widest font-mono transition-all btn-ready opacity-20 cursor-not-allowed";
      recordBtn.innerText = "[ WAITING FOR TELEMETRY UPLINK ]";
      recordBtn.disabled = true;
    }

    function triggerEndContest() {
      if (!confirm("Decommission system telemetry tracking permanently for tonight?")) return;
      const script = document.createElement("script");
      script.src = `${WEB_APP_URL}?action=triggerContestClosure&callback=contestClosureConfirmation`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    }

    window.contestClosureConfirmation = function(response) {
      alert("Mainframe records closed, finalized, and logged.");
      resetHardwareState();
      refreshDashboardData();
    };

    window.onload = refreshDashboardData;
  </script>
</body>
</html>
