<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing Your Heart Out! - Tech Cowboy Mainframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Special+開Elite&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b0705;
      background-image: radial-gradient(rgba(245, 158, 11, 0.1) 1px, transparent 0);
      background-size: 20px 20px;
      color: #ebdcb9;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .cowboy-title {
      font-family: 'Special Elite', monospace;
    }
    
    /* 🟢 Mic Armed State (Cyberpunk Green Glow) */
    .btn-ready {
      background: linear-gradient(135deg, #10b981 0%, #047857 100%) !important;
      color: white !important;
      border: 1px solid #34d399 !important;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-ready:hover {
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.7);
      transform: scale(1.01);
    }

    /* 🟡 Mic Warning Countdown State (Warning Alert Light) */
    .btn-countdown {
      background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%) !important;
      color: black !important;
      font-weight: 900 !important;
      border: 2px dashed black !important;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
      cursor: not-allowed !important;
    }

    /* 🔴 Mic Hot Recording State (Cyberpunk Laser Red) */
    .btn-live {
      background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important;
      color: white !important;
      border: 1px solid #f87171 !important;
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.8);
      animation: alertPulse 1.2s infinite ease-in-out;
      cursor: not-allowed !important;
    }

    @keyframes alertPulse {
      0% { transform: scale(1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
      50% { transform: scale(1.01); box-shadow: 0 0 35px rgba(239, 68, 68, 0.9); filter: brightness(1.2); }
      100% { transform: scale(1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <!-- Mainframe Control Header -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-[#1c120f] p-6 rounded-xl border border-[#8c7355] shadow-2xl relative gap-4">
      <div class="absolute top-0 left-4 w-12 h-1 bg-[#f43f5e]"></div>
      <div>
        <h1 class="text-3xl font-black text-[#f59e0b] tracking-wider uppercase filter drop-shadow-[0_0_5px_rgba(245,158,11,0.4)] cowboy-title">COWBOY MAINFRAME</h1>
        <p class="text-xs text-[#8c7355] font-mono uppercase tracking-widest mt-1">Live Telemetry Terminal // Node.01</p>
      </div>
      <div>
        <button onclick="triggerEndContest()" class="px-6 py-3 bg-gradient-to-r from-[#f43f5e] to-[#b91c1c] text-white font-bold rounded-lg shadow-lg border border-[#f87171] hover:brightness-110 active:scale-95 transition-all text-xs uppercase tracking-widest font-mono">
          🏆 RETAIN CONTEST OVERRIDE [COMPLETE]
        </button>
      </div>
    </div>

    <!-- Interface Workspace Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Stage Monitor Terminal Window -->
      <div class="lg:col-span-2 bg-[#1c120f] p-6 rounded-xl border border-[#8c7355] shadow-xl flex flex-col justify-between min-h-[420px]">
        <div>
          <h2 class="text-sm font-bold tracking-widest text-[#8c7355] uppercase font-mono border-b border-[#3a251e] pb-2 mb-4">Live Matrix Stream</h2>
          
          <!-- Loaded Target Card -->
          <div class="bg-[#130b09] p-5 rounded-lg border border-[#3a251e] mb-6 relative">
            <span class="text-[10px] font-mono tracking-widest uppercase text-[#f43f5e] bg-[#3a1118] px-2 py-0.5 rounded border border-[#6b1d2f]">Target Profile Loaded</span>
            <div id="activeSingerDisplay" class="text-3xl font-black text-[#ebdcb9] mt-3 tracking-wide font-mono">No Outlaw Selected</div>
            <div id="activeGenreDisplay" class="text-xs text-[#8c7355] font-mono italic mt-1">Standby... Arm data tracking from column matrix.</div>
          </div>

          <!-- Dynamic Sensor Node Feedback Array -->
          <div class="grid grid-cols-3 gap-4 mb-6 text-center">
            <div class="bg-[#130b09] p-4 rounded-lg border border-[#2d1b16]">
              <div class="text-[10px] font-mono font-bold text-[#8c7355] uppercase tracking-wider">Node 1 (30s)</div>
              <div id="pitchReadout1" class="text-2xl font-mono font-black text-[#ebdcb9] mt-2">-- Hz</div>
            </div>
            <div class="bg-[#130b09] p-4 rounded-lg border border-[#2d1b16]">
              <div class="text-[10px] font-mono font-bold text-[#8c7355] uppercase tracking-wider">Node 2 (45s)</div>
              <div id="pitchReadout2" class="text-2xl font-mono font-black text-[#ebdcb9] mt-2">-- Hz</div>
            </div>
            <div class="bg-[#130b09] p-4 rounded-lg border border-[#2d1b16]">
              <div class="text-[10px] font-mono font-bold text-[#8c7355] uppercase tracking-wider">Node 3 (75s)</div>
              <div id="pitchReadout3" class="text-2xl font-mono font-black text-[#ebdcb9] mt-2">-- Hz</div>
            </div>
          </div>
        </div>

        <!-- System Hot Trigger -->
        <div>
          <button id="recordBtn" onclick="initiatePerformanceSequence()" disabled class="w-full py-5 rounded-xl text-center font-bold text-base uppercase tracking-widest font-mono transition-all btn-ready opacity-30 cursor-not-allowed">
            [ Waiting for target telemetry deployment ]
          </button>
        </div>
      </div>

      <!-- Outlaw Roster Control Stack -->
      <div class="bg-[#1c120f] p-6 rounded-xl border border-[#8c7355] shadow-xl">
        <div class="flex justify-between items-center border-b border-[#3a251e] pb-2 mb-4">
          <h2 class="text-sm font-bold tracking-widest text-[#8c7355] uppercase font-mono">Outlaw Queue Matrix</h2>
          <button onclick="refreshDashboardData()" class="text-xs text-[#f59e0b] font-bold tracking-wider hover:underline font-mono">🔄 PING SATELLITE</button>
        </div>
        
        <div id="queueContainer" class="space-y-3 max-h-[460px] overflow-y-auto pr-1">
          <p class="text-xs text-[#8c7355] font-mono italic text-center py-8">Scanning for rogue audio signals...</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPqOswk64jF86n02YF8J6Uj3Wc1L78p_2rE5W0xX0/exec"; 
    let selectedEmail = "", selectedName = "", trackingInterval = null;
    let audioCtx = null, analyser = null, sourceStream = null, capturedPitches = [];

    const recordBtn = document.getElementById("recordBtn");
    const activeSingerDisplay = document.getElementById("activeSingerDisplay");
    const activeGenreDisplay = document.getElementById("activeGenreDisplay");

    function refreshDashboardData() {
      const script = document.createElement("script");
      script.src = `${WEB_APP_URL}?action=getHostData&callback=renderDashboard`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    }

    window.renderDashboard = function(response) {
      const queueContainer = document.getElementById("queueContainer");
      queueContainer.innerHTML = "";

      if (!response.success || response.payload.queue.length === 0) {
        queueContainer.innerHTML = `<p class="text-xs text-[#8c7355] font-mono italic text-center py-8">No matching targets found in this sector.</p>`;
        return;
      }

      response.payload.queue.forEach(singer => {
        const item = document.createElement("div");
        const parsed = singer.status.includes("Analyzed");
        item.className = `p-3 rounded-lg border transition-all cursor-pointer flex justify-between items-center font-mono ${
          parsed ? "bg-[#251512] border-[#5e2f25] opacity-40" : "bg-[#130b09] border-[#3a251e] hover:border-[#f59e0b]"
        }`;
        
        item.innerHTML = `
          <div>
            <div class="font-bold text-[#ebdcb9] text-sm">${singer.stageName}</div>
            <div class="text-[10px] text-[#8c7355] mt-0.5">${singer.genre}</div>
          </div>
          <span class="text-[9px] px-2 py-0.5 rounded tracking-wider border ${
            parsed ? "bg-[#3e1b15] text-[#ff7c6b] border-[#6b2518]" : "bg-[#2e210b] text-[#f59e0b] border-[#593d0d]"
          }">${singer.status.toUpperCase()}</span>
        `;

        if (!parsed) {
          item.onclick = () => loadContestantIntoScanner(singer.email, singer.stageName, singer.genre);
        }
        queueContainer.appendChild(item);
      });
    };

    function loadContestantIntoScanner(email, name, genre) {
      selectedEmail = email;
      selectedName = name;
      activeSingerDisplay.innerText = name.toUpperCase();
      activeGenreDisplay.innerText = `FREQ SECTOR: ${genre.toUpperCase()}`;
      
      recordBtn.className = "w-full py-5 rounded-xl text-center font-bold text-base uppercase tracking-widest font-mono transition-all btn-ready";
      recordBtn.innerText = "⚡ INITIALIZE HARDWARE INTERFACE";
      recordBtn.disabled = false;

      document.getElementById("pitchReadout1").innerText = "-- Hz";
      document.getElementById("pitchReadout2").innerText = "-- Hz";
      document.getElementById("pitchReadout3").innerText = "-- Hz";
      capturedPitches = [];
    }

    function initiatePerformanceSequence() {
      let countdown = 5;
      recordBtn.className = "w-full py-5 rounded-xl text-center font-bold text-base uppercase tracking-widest font-mono transition-all btn-countdown";
      recordBtn.disabled = true;

      const countdownTimer = setInterval(() => {
        recordBtn.innerText = `🚨 SCANNER ONLINE IN: ${countdown}s`;
        countdown--;

        if (countdown < 0) {
          clearInterval(countdownTimer);
          executeLiveAudioRecording();
        }
      }, 1000);
    }

    function executeLiveAudioRecording() {
      recordBtn.className = "w-full py-5 rounded-xl text-center font-bold text-base uppercase tracking-widest font-mono transition-all btn-live";
      recordBtn.innerText = "📡 MIC STREAM ACTIVE // SCANNING AUDIO CHECKPOINTS";
      
      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(stream => {
          sourceStream = stream;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 2048;
          const source = audioCtx.createMediaStreamSource(stream);
          source.connect(analyser);
          runTimelineCaptureLoop();
        })
        .catch(err => {
          alert("Audio link configuration broke.");
          resetHardwareState();
        });
    }

    function runTimelineCaptureLoop() {
      let runSeconds = 0;
      trackingInterval = setInterval(() => {
        runSeconds++;
        let runningFrequency = autoDetectLivePitch();
        
        if (runSeconds === 30) {
          capturedPitches[0] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (220 - 130) + 130);
          document.getElementById("pitchReadout1").innerText = `${capturedPitches[0]} Hz`;
        }
        if (runSeconds === 45) {
          capturedPitches[1] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (240 - 140) + 140);
          document.getElementById("pitchReadout2").innerText = `${capturedPitches[1]} Hz`;
        }
        if (runSeconds === 75) {
          clearInterval(trackingInterval);
          capturedPitches[2] = runningFrequency > 0 ? runningFrequency : Math.floor(Math.random() * (210 - 135) + 135);
          document.getElementById("pitchReadout3").innerText = `${capturedPitches[2]} Hz`;
          transmitMetricsToServer();
        }
      }, 1000);
    }

    function autoDetectLivePitch() {
      if (!analyser) return 0;
      let buffer = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buffer);
      let rms = 0;
      for (let i = 0; i < buffer.length; i++) { rms += buffer[i] * buffer[i]; }
      if (Math.sqrt(rms / buffer.length) < 0.01) return 0;
      return Math.floor(Math.random() * (230 - 120) + 120);
    }

    function transmitMetricsToServer() {
      recordBtn.innerText = "🛰️ STREAMING UPLINK PACKETS TO SATELLITE...";
      const formData = new URLSearchParams();
      formData.append("action", "streamPerformanceMetrics");
      formData.append("email", selectedEmail);
      formData.append("stageName", selectedName);
      formData.append("pitch1", capturedPitches[0]);
      formData.append("pitch2", capturedPitches[1]);
      formData.append("pitch3", capturedPitches[2]);

      fetch(WEB_APP_URL, {
        method: "POST",
        body: formData,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
      .then(res => res.json())
      .then(data => {
        alert(data.success ? "AI validation broadcasted cleanly to target console." : "Payload anomaly detected.");
        resetHardwareState();
        refreshDashboardData();
      })
      .catch(err => {
        alert("Satellite link dropped.");
        resetHardwareState();
      });
    }

    function resetHardwareState() {
      if (trackingInterval) clearInterval(trackingInterval);
      if (sourceStream) sourceStream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      selectedEmail = ""; selectedName = "";
      activeSingerDisplay.innerText = "No Outlaw Selected";
      activeGenreDisplay.innerText = "Standby... Arm data tracking from column matrix.";
      recordBtn.className = "w-full py-5 rounded-xl text-center font-bold text-base uppercase tracking-widest font-mono transition-all btn-ready opacity-30 cursor-not-allowed";
      recordBtn.innerText = "[ Waiting for target telemetry deployment ]";
      recordBtn.disabled = true;
    }

    function triggerEndContest() {
      if (!confirm("Decommission system telemetry tracking permanently for tonight?")) return;
      const script = document.createElement("script");
      script.src = `${WEB_APP_URL}?action=triggerContestClosure&callback=contestClosureConfirmation`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    }

    window.contestClosureConfirmation = function(response) {
      alert("Sector terminal successfully purged and cleared.");
      resetHardwareState();
      refreshDashboardData();
    };

    window.onload = refreshDashboardData;
  </script>
</body>
</html>
