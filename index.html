<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing Your Heart Out - Registration Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #8c5835; /* Lighter warm brown wood framing base */
      background-image: linear-gradient(rgba(140, 88, 53, 0.85), rgba(115, 69, 36, 0.95)), 
                        url('https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=1200'); /* Outer wood panel structure */
      background-size: cover;
      color: #2b1a0d; /* Dark espresso brown text for pristine legibility */
      font-family: Arial, Helvetica, sans-serif; /* Clean sans-serif override */
    }
    
    /* ⚡ Clean Old Paper Card Content Box with Neon Purple Highlight Loop */
    .parchment-mainframe {
      background-color: #f7ebd3; /* Genuine light old paper/parchment tone */
      border: 4px solid #8c5835; /* Wood border wrapper */
      outline: 3px solid #b624ff; /* Electric neon purple outer light tube */
      box-shadow: 0 0 20px #aa00ff, inset 0 0 10px rgba(170, 0, 255, 0.15);
    }

    /* Terminal Input Fields matching the parchment motif */
    input, select {
      background-color: #ffffff !important;
      border: 2px solid #a68463 !important;
      color: #2b1a0d !important;
      font-family: Arial, Helvetica, sans-serif;
    }
    input:focus, select:focus {
      outline: none !important;
      border-color: #aa00ff !important;
      box-shadow: 0 0 8px #aa00ff !important;
    }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-xl p-8 rounded-xl relative parchment-mainframe">
    <!-- Clean Tech Corner Crosshairs -->
    <div class="absolute top-2 left-2 w-3 h-3 border-t-2 border-l-2 border-[#aa00ff]"></div>
    <div class="absolute top-2 right-2 w-3 h-3 border-t-2 border-r-2 border-[#aa00ff]"></div>
    <div class="absolute bottom-2 left-2 w-3 h-3 border-b-2 border-l-2 border-[#aa00ff]"></div>
    <div class="absolute bottom-2 right-2 w-3 h-3 border-b-2 border-r-2 border-[#aa00ff]"></div>

    <!-- Header Grid -->
    <div class="text-center mb-8 border-b-2 border-solid border-[#a68463] pb-6">
      <h1 class="text-4xl font-black tracking-tight uppercase text-[#2b1a0d] filter drop-shadow-[0_2px_4px_rgba(170,0,255,0.2)]">
        SING YOUR HEART OUT
      </h1>
      <p class="text-xs uppercase tracking-[0.25em] text-[#aa00ff] mt-2 font-bold">
        SYSTEM DEPLOYMENT // FRONT INTERFACE NODE
      </p>
    </div>

    <!-- Action Forms -->
    <form id="registrationForm" onsubmit="submitOutlawSignup(event)" class="space-y-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-[#2b1a0d] mb-2">🤠 STAGE NAME / HANDLE</label>
        <input type="text" id="stageName" required placeholder="e.g., NeonWyatt" class="w-full px-4 py-3 rounded-lg transition-all font-bold">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-[#2b1a0d] mb-2">📧 EMAIL COORDINATE</label>
        <input type="email" id="email" required placeholder="outlaw@frontier.net" class="w-full px-4 py-3 rounded-lg transition-all font-bold">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-[#2b1a0d] mb-2">💿 VOCAL GENRE SECTOR</label>
        <select id="genre" required class="w-full px-4 py-3 rounded-lg transition-all font-bold appearance-none bg-white">
          <option value="Pop Anthems">Pop Anthems</option>
          <option value="Rock Ballads">Rock Ballads</option>
          <option value="Classic Country">Classic Country</option>
          <option value="Modern Country Pop">Modern Country Pop</option>
          <option value="R&B and Soul">R&B and Soul</option>
          <option value="Hip-Hop and Rap">Hip-Hop and Rap</option>
          <option value="Jazz and Blues">Jazz and Blues</option>
          <option value="Latin Hits">Latin Hits</option>
        </select>
      </div>

      <div class="flex items-center gap-3 bg-[#f2dfb8] p-4 rounded-lg border border-[#a68463]">
        <input type="checkbox" id="contestOptIn" checked class="w-5 h-5 rounded cursor-pointer accent-[#aa00ff]">
        <label for="contestOptIn" class="text-xs text-[#2b1a0d] font-medium leading-tight">
          AUTHORIZE TELEMETRY UPLINK. STREAM LIVE PERFORMANCE AUDITS TO ALL ACTIVE MAIN REGISTER LOGS.
        </label>
      </div>

      <button type="submit" class="w-full py-4 rounded-lg font-black uppercase tracking-widest text-white bg-[#aa00ff] hover:bg-[#b624ff] transition-all duration-300 shadow-md border-b-4 border-[#7b00b8] text-sm">
        ⚡ JACK INTO THE TIMELINE
      </button>
    </form>
  </div>

  <script>
    const CONFIG_API = "https://script.google.com/macros/s/AKfycbwPqOswk64jF86n02YF8J6Uj3Wc1L78p_2rE5W0xX0/exec";

    function submitOutlawSignup(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.innerText = "🚨 LOCKING DATA PACKETS...";
      btn.disabled = true;

      const params = new URLSearchParams();
      params.append("action", "registerParticipant");
      params.append("stageName", document.getElementById("stageName").value);
      params.append("email", document.getElementById("email").value);
      params.append("genre", document.getElementById("genre").value);
      params.append("contestOptIn", document.getElementById("contestOptIn").checked ? "Yes" : "No");

      fetch(CONFIG_API, {
        method: "POST",
        body: params,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          alert("Telemetry synchronized. Report to the stage microphone.");
          document.getElementById("registrationForm").reset();
        } else {
          alert("Signal dropout: " + data.message);
        }
        btn.innerText = "⚡ JACK INTO THE TIMELINE";
        btn.disabled = false;
      })
      .catch(err => {
        alert("Connection anomaly in outback territory.");
        btn.innerText = "⚡ JACK INTO THE TIMELINE";
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
