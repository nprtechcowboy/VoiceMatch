<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing Your Heart Out - The Cyber Frontier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Impact for heavy cyber framing, Special Elite for a gritty mechanical cowboy feel -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b0705; /* Deep, dark outback midnight */
      background-image: radial-gradient(rgba(244, 63, 94, 0.15) 1px, transparent 0);
      background-size: 24px 24px;
      color: #ebdcb9; /* Weathered parchment text */
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .cowboy-font {
      font-family: 'Special Elite', monospace;
    }
    .cyber-glow-amber {
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
      border: 1px solid #f59e0b;
    }
    .cyber-glow-neon {
      box-shadow: 0 0 20px rgba(244, 63, 94, 0.5);
      border: 1px solid #f43f5e;
    }
    /* Input formatting to match mechanical terminal hardware */
    input, select {
      background-color: #170f0d !important;
      border: 1px solid #8c7355 !important;
      color: #ebdcb9 !important;
    }
    input:focus, select:focus {
      outline: none !important;
      border-color: #f43f5e !important;
      box-shadow: 0 0 10px rgba(244, 63, 94, 0.4) !important;
    }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-xl bg-[#1c120f] p-8 rounded-2xl border-2 border-[#8c7355] shadow-2xl relative overflow-hidden">
    <!-- Corner accent matrix ticks -->
    <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-[#f59e0b]"></div>
    <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-[#f59e0b]"></div>
    <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-[#f59e0b]"></div>
    <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-[#f59e0b]"></div>

    <!-- Header Block -->
    <div class="text-center mb-8 border-b-2 border-dashed border-[#8c7355] pb-6">
      <h1 class="text-4xl font-black text-[#f43f5e] tracking-wider uppercase filter drop-shadow-[0_0_8px_rgba(244,63,94,0.6)] cowboy-font">
        SING YOUR HEART OUT
      </h1>
      <p class="text-xs uppercase tracking-[0.2em] text-[#f59e0b] mt-2 font-bold">
        ⚡ EST. 2026 // SYSTEM DEPLOYMENT DETECTED ⚡
      </p>
      <p class="text-sm text-[#8c7355] italic mt-2">Step up to the mic, outlaw. Mount the stage and let the AI scan your frequency.</p>
    </div>

    <!-- Registration Form Elements -->
    <form id="registrationForm" onsubmit="submitOutlawSignup(event)" class="space-y-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-[#f59e0b] mb-2 cowboy-font">🤠 Handle / Stage Name</label>
        <input type="text" id="stageName" required placeholder="e.g., NeonWyatt" class="w-full px-4 py-3 rounded-xl transition-all font-mono">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-[#f59e0b] mb-2 cowboy-font">📧 Comm Coordinate (Email)</label>
        <input type="email" id="email" required placeholder="outlaw@frontier.net" class="w-full px-4 py-3 rounded-xl transition-all font-mono">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-[#f59e0b] mb-2 cowboy-font">💿 Vocal Genre Lane</label>
        <select id="genre" required class="w-full px-4 py-3 rounded-xl transition-all font-mono appearance-none">
          <option value="Pop Anthems">Pop Anthems</option>
          <option value="Rock Ballads">Rock Ballads</option>
          <option value="Classic Country">Classic Country</option>
          <option value="Modern Country Pop">Modern Country Pop</option>
          <option value="R&B and Soul">R&B and Soul</option>
          <option value="Hip-Hop and Rap">Hip-Hop and Rap</option>
          <option value="Jazz and Blues">Jazz and Blues</option>
          <option value="Latin Hits">Latin Hits</option>
        </select>
      </div>

      <div class="flex items-center gap-3 bg-[#130b09] p-4 rounded-xl border border-[#3a251e]">
        <input type="checkbox" id="contestOptIn" checked class="w-5 h-5 rounded cursor-pointer accent-[#f43f5e]">
        <label for="contestOptIn" class="text-xs text-[#8c7355] leading-tight">
          Authorize system telemetry audit. I opt-in to streaming performance metrics to the global leaderboards.
        </label>
      </div>

      <!-- Action Button -->
      <button type="submit" class="w-full py-4 rounded-xl font-bold uppercase tracking-widest text-black bg-[#f59e0b] hover:bg-[#f43f5e] hover:text-white transition-all duration-300 shadow-lg font-mono filter drop-shadow-[0_0_5px_rgba(245,158,11,0.4)]">
        🔗 JACK INTO THE TIMELINE
      </button>
    </form>
  </div>

  <script>
    const CONFIG_API = "https://script.google.com/macros/s/AKfycbwPqOswk64jF86n02YF8J6Uj3Wc1L78p_2rE5W0xX0/exec";

    function submitOutlawSignup(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.innerText = "🚨 LOCKING DATA MATRIX...";
      btn.disabled = true;

      const params = new URLSearchParams();
      params.append("action", "registerParticipant");
      params.append("stageName", document.getElementById("stageName").value);
      params.append("email", document.getElementById("email").value);
      params.append("genre", document.getElementById("genre").value);
      params.append("contestOptIn", document.getElementById("contestOptIn").checked ? "Yes" : "No");

      fetch(CONFIG_API, {
        method: "POST",
        body: params,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          alert("Matrix entry approved. Report to the stage microphone immediately, Cowboy.");
          document.getElementById("registrationForm").reset();
        } else {
          alert("Signal dropout: " + data.message);
        }
        btn.innerText = "🔗 JACK INTO THE TIMELINE";
        btn.disabled = false;
      })
      .catch(err => {
        alert("Connection timed out in the cyber outback.");
        btn.innerText = "🔗 JACK INTO THE TIMELINE";
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
