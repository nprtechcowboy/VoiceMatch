<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing Your Heart Out - Registration Node</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #2b170c;
      background-image: linear-gradient(rgba(43, 23, 12, 0.8), rgba(28, 15, 8, 0.9)), 
                        url('https://images.unsplash.com/photo-1541123437800-1bb1317badc2?q=80&w=1200');
      background-size: cover;
      background-attachment: fixed;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1a0d;
    }
    
    .parchment-container {
      background-color: #f7ebd3;
      background-image: radial-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 0);
      background-size: 12px 12px;
      clip-path: polygon(
        0% 2%, 3% 0%, 7% 3%, 11% 1%, 15% 4%, 20% 1%, 24% 3%, 28% 0%, 33% 2%, 38% 0%, 42% 3%, 47% 1%, 52% 4%, 56% 1%, 61% 3%, 65% 0%, 70% 2%, 75% 1%, 79% 4%, 84% 0%, 88% 3%, 93% 1%, 97% 4%, 100% 1%,
        100% 98%, 96% 100%, 92% 97%, 88% 99%, 83% 96%, 79% 99%, 75% 97%, 71% 100%, 66% 97%, 62% 99%, 57% 96%, 53% 99%, 48% 97%, 44% 100%, 39% 97%, 35% 99%, 30% 96%, 26% 99%, 21% 97%, 17% 100%, 12% 96%, 8% 98%, 4% 96%, 0% 99%
      );
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    input, select {
      background-color: #ffffff !important;
      border: 2px solid #a68463 !important;
      color: #2b1a0d !important;
      font-weight: bold;
      font-family: Arial, Helvetica, sans-serif;
    }
    input:focus, select:focus {
      outline: none !important;
      border-color: #8c5835 !important;
      box-shadow: 0 0 0 3px rgba(140, 88, 53, 0.2) !important;
    }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-xl">
    <div class="parchment-container">
      
      <div class="text-center mb-8 border-b-2 border-solid border-[#a68463] pb-6">
        <h1 class="text-4xl font-black tracking-tight uppercase text-[#2b1a0d]">
          SING YOUR HEART OUT
        </h1>
        <p class="text-xs uppercase tracking-[0.2em] text-[#7a5535] mt-1.5 font-bold">
          LIVE FRONTEND INTAKE LOG
        </p>
      </div>

      <form id="registrationForm" onsubmit="submitOutlawSignup(event)" class="space-y-6">
        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-[#2b1a0d] mb-2">🤠 PERFORMER STAGE HANDLE</label>
          <input type="text" id="stageName" required placeholder="e.g., Wyatt" class="w-full px-4 py-3 rounded text-sm transition-all">
        </div>

        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-[#2b1a0d] mb-2">📧 COMM LINK ADDRESS (EMAIL)</label>
          <input type="email" id="email" required placeholder="cowboy@frontier.net" class="w-full px-4 py-3 rounded text-sm transition-all">
        </div>

        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-[#2b1a0d] mb-2">💿 SELECTED SONG CATEGORY LANE</label>
          <select id="genre" required class="w-full px-4 py-3 rounded text-sm transition-all appearance-none bg-white">
            <option value="Pop Anthems">Pop Anthems</option>
            <option value="Rock Ballads">Rock Ballads</option>
            <option value="Classic Country">Classic Country</option>
            <option value="Modern Country Pop">Modern Country Pop</option>
            <option value="R&B and Soul">R&B and Soul</option>
            <option value="Hip-Hop and Rap">Hip-Hop and Rap</option>
            <option value="Jazz and Blues">Jazz and Blues</option>
            <option value="Latin Hits">Latin Hits</option>
          </select>
        </div>

        <!-- 🔒 Mandatory Consent Framework Grid Component -->
        <div class="flex items-start gap-3 bg-[#ebd9b5] p-4 rounded border border-[#c2aa80]">
          <input type="checkbox" id="contestOptIn" required class="w-5 h-5 mt-0.5 rounded cursor-pointer accent-[#8c5835]">
          <label for="contestOptIn" class="text-xs text-[#2b1a0d] font-black leading-tight cursor-pointer select-none">
            I AGREE TO THE CONTEST CONSTRAINTS. I AUTHORIZE LIVE AUDIO TELEMETRY CAPTURE AND CONSENT TO COUPLING MY VOICE METRICS TO THE SYSTEM MAINFRAME.
          </label>
        </div>

        <button type="submit" class="w-full py-4 rounded font-black uppercase tracking-wider text-white bg-[#7a4b29] hover:bg-[#613b1f] active:transform active:scale-[0.99] transition-all duration-150 border-b-4 border-[#4d2f19] text-sm shadow-md">
          SUBMIT MATRIX SIGNUP
        </button>
      </form>

    </div>
  </div>

  <script>
    const CONFIG_API = "https://script.google.com/macros/s/AKfycbxw2QK_grUqX_ng90PAbOIVK_v9T_fPc39rgbr60hfWAco7UYLbNNzucAJaWUNXZerr/exec";

    function submitOutlawSignup(e) {
      e.preventDefault();
      
      const consentBox = document.getElementById("contestOptIn");
      if (!consentBox.checked) {
        alert("System Override: You must authorize voice telemetry capture to register.");
        return;
      }

      const btn = e.target.querySelector('button');
      btn.innerText = "SAVING TELEMETRY DATA...";
      btn.disabled = true;

      const params = new URLSearchParams();
      params.append("action", "registerParticipant");
      params.append("stageName", document.getElementById("stageName").value);
      params.append("email", document.getElementById("email").value);
      params.append("genre", document.getElementById("genre").value);
      params.append("contestOptIn", "Yes");

      fetch(CONFIG_API, {
        method: "POST",
        body: params,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          alert("Telemetry established! Let the host know when you're stepping up to the mic so they can jack your voice into the mainframe.");
          document.getElementById("registrationForm").reset();
        } else {
          alert("Signal error: " + data.message);
        }
        btn.innerText = "SUBMIT MATRIX SIGNUP";
        btn.disabled = false;
      })
      .catch(err => {
        alert("System timeout across the wire connection.");
        btn.innerText = "SUBMIT MATRIX SIGNUP";
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
