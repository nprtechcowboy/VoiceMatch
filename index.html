<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing Your Heart Out - Registration Node</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #1a0d07; /* Deep, dark western mahogany tone */
      background-image: linear-gradient(rgba(26, 13, 7, 0.85), rgba(26, 13, 7, 0.95)), 
                        url('https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=1200'); /* Subtle wood grain texture underlay */
      background-size: cover;
      color: #ebdcb9; /* Warm western cream text */
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .cowboy-font {
      font-family: 'Special Elite', monospace;
    }
    /* ⚡ Precise Neon Purple Frame Trim */
    .neon-border-purple {
      border: 2px solid #b624ff;
      box-shadow: 0 0 12px #aa00ff, inset 0 0 6px rgba(170, 0, 255, 0.3);
      background-color: #120703; /* Pitch black saloon interior shading */
    }
    /* Hardware Terminal Input Overhauls */
    input, select {
      background-color: #1c0f0a !important;
      border: 1px solid #6b4c35 !important;
      color: #ebdcb9 !important;
    }
    input:focus, select:focus {
      outline: none !important;
      border-color: #b624ff !important;
      box-shadow: 0 0 8px #aa00ff !important;
    }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-xl p-8 rounded-xl relative neon-border-purple">
    <!-- Cybernetic Corner Brackets -->
    <div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-[#ebdcb9]"></div>
    <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-[#ebdcb9]"></div>
    <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-[#ebdcb9]"></div>
    <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-[#ebdcb9]"></div>

    <!-- Header Grid -->
    <div class="text-center mb-8 border-b border-[#6b4c35] pb-6">
      <h1 class="text-4xl font-black text-white tracking-widest uppercase filter drop-shadow-[0_0_6px_#aa00ff] cowboy-font">
        SING YOUR HEART OUT
      </h1>
      <p class="text-xs uppercase tracking-[0.3em] text-[#b624ff] mt-2 font-bold font-mono">
        ★ SYSTEM DEPLOYMENT DETECTED // NODE.01 ★
      </p>
    </div>

    <!-- Action Forms -->
    <form id="registrationForm" onsubmit="submitOutlawSignup(event)" class="space-y-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-[#ebdcb9] mb-2 font-mono">🤠 OUTLAW HANDLE / STAGE NAME</label>
        <input type="text" id="stageName" required placeholder="e.g., NeonWyatt" class="w-full px-4 py-3 rounded-lg transition-all font-mono">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-[#ebdcb9] mb-2 font-mono">📧 COMM LINK DATA (EMAIL)</label>
        <input type="email" id="email" required placeholder="outlaw@frontier.net" class="w-full px-4 py-3 rounded-lg transition-all font-mono">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-[#ebdcb9] mb-2 font-mono">💿 VOCAL SPECTRUM LANE</label>
        <select id="genre" required class="w-full px-4 py-3 rounded-lg transition-all font-mono appearance-none">
          <option value="Pop Anthems">Pop Anthems</option>
          <option value="Rock Ballads">Rock Ballads</option>
          <option value="Classic Country">Classic Country</option>
          <option value="Modern Country Pop">Modern Country Pop</option>
          <option value="R&B and Soul">R&B and Soul</option>
          <option value="Hip-Hop and Rap">Hip-Hop and Rap</option>
          <option value="Jazz and Blues">Jazz and Blues</option>
          <option value="Latin Hits">Latin Hits</option>
        </select>
      </div>

      <div class="flex items-center gap-3 bg-[#1c0f0a] p-4 rounded-lg border border-[#4a2e1b]">
        <input type="checkbox" id="contestOptIn" checked class="w-5 h-5 rounded cursor-pointer accent-[#aa00ff]">
        <label for="contestOptIn" class="text-xs text-[#ebdcb9] opacity-70 leading-tight font-mono">
          AUTHORIZE TELEMETRY MATRIX STRIP. BROADCAST ALL PERFORMANCE FREQUENCIES TO PUBLIC TERMINALS.
        </label>
      </div>

      <button type="submit" class="w-full py-4 rounded-lg font-bold uppercase tracking-widest text-white bg-[#aa00ff] hover:bg-[#b624ff] transition-all duration-300 shadow-md font-mono border border-white filter drop-shadow-[0_0_4px_#aa00ff]">
        ⚡ JACK INTO THE MATRIX
      </button>
    </form>
  </div>

  <script>
    const CONFIG_API = "https://script.google.com/macros/s/AKfycbwPqOswk64jF86n02YF8J6Uj3Wc1L78p_2rE5W0xX0/exec";

    function submitOutlawSignup(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.innerText = "🚨 SYNCING CORE DATA DATA...";
      btn.disabled = true;

      const params = new URLSearchParams();
      params.append("action", "registerParticipant");
      params.append("stageName", document.getElementById("stageName").value);
      params.append("email", document.getElementById("email").value);
      params.append("genre", document.getElementById("genre").value);
      params.append("contestOptIn", document.getElementById("contestOptIn").checked ? "Yes" : "No");

      fetch(CONFIG_API, {
        method: "POST",
        body: params,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          alert("Matrix link established. Report to the performance stage microphone immediately.");
          document.getElementById("registrationForm").reset();
        } else {
          alert("Transmission anomaly: " + data.message);
        }
        btn.innerText = "⚡ JACK INTO THE MATRIX";
        btn.disabled = false;
      })
      .catch(err => {
        alert("Signal dropped out in the deep territory.");
        btn.innerText = "⚡ JACK INTO THE MATRIX";
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
